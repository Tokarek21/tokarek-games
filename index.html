<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Centrum Gier</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Prosta animacja tła */
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 { font-size: 3rem; text-shadow: 0 0 20px #00d2ff; }

        /* Kontener gier */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            width: 80%;
        }

        /* Karta gry */
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
        }

        .game-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        button {
            background: #00d2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header>
        <h1>🎮 Game Hub</h1>
        <p>Wybierz swoją przygodę</p>
    </header>

    <div class="game-grid">
        <div class="game-card" onclick="playClickSound(); location.href='gra1.html'">
            <div class="game-icon">🐍</div>
            <h3>Snake Retro</h3>
            <p>Klasyczny wąż w nowym wydaniu.</p>
            <button>Graj teraz</button>
        </div>

        <div class="game-card" onclick="playClickSound(); location.href='gra2.html'">
            <div class="game-icon">🧱</div>
            <h3>Arkanoid</h3>
            <p>Zbijaj klocki i zdobywaj punkty.</p>
            <button>Graj teraz</button>
        </div>

        <div class="game-card" onclick="playClickSound();">
            <div class="game-icon">🚀</div>
            <h3>Space Invaders</h3>
            <p>Wkrótce dostępne!</p>
            <button>Czekaj...</button>
        </div>
    </div>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        function playClickSound() {
            const audio = document.getElementById('clickSound');
            audio.play();
        }
    </script>

</body>
</html>
